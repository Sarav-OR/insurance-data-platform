name: Insurance Data Platform — CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Code Quality
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E221,E241,E302,E402,E122,E127,W504,F401 \
            --exclude=__pycache__ 

  # ─────────────────────────────────────────────
  # JOB 2 — Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java for PySpark
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Run unit tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results/results.xml \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # JOB 3 — Config Validation
  # ─────────────────────────────────────────────
  config-validation:
    name: Config & DQ Rules Validation
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate fraud weights sum to 1.0
        run: |
          python -c "
          from src.config import FRAUD_WEIGHTS
          total = sum(FRAUD_WEIGHTS.values())
          assert abs(total - 1.0) < 1e-9, f'Fraud weights sum to {total}'
          print(f'✅ Fraud weights valid: {FRAUD_WEIGHTS}')
          "

      - name: Validate DQ rules structure
        run: |
          python -c "
          from src.dq_rules import BRONZE_DQ_RULES
          domains = ['customers', 'policies', 'claims', 'premiums', 'fraud_signals']
          for domain in domains:
              rules = BRONZE_DQ_RULES.get(domain, [])
              assert len(rules) > 0, f'No rules for {domain}'
              for rule, code in rules:
                  assert code.startswith('ERR_'), f'Bad code: {code}'
          print(f'✅ DQ rules valid for all {len(domains)} domains')
          "

      - name: Print all DQ rules
        run: |
          python src/dq_rules.py

  # ─────────────────────────────────────────────
  # JOB 4 — Notebook Syntax Check
  # ─────────────────────────────────────────────
  notebook-syntax:
    name: Notebook Syntax Check
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax on all notebooks
        run: |
          for f in notebooks/*.py; do
            echo "Checking syntax: $f"
            python -m py_compile "$f" && echo "  ✅ OK" || echo "  ❌ FAILED"
          done
